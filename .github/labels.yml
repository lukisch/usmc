# Standard-Labels aus GOVERNANCE.md §4.2
# Wird von label-sync.yml verwendet
- name: bug
  color: 'd73a4a'
  description: 'Confirmed bug'
- name: enhancement
  color: 'a2eeef'
  description: 'New feature or improvement'
- name: good first issue
  color: '7057ff'
  description: 'Good for newcomers'
- name: help wanted
  color: '008672'
  description: 'Community help welcome'
- name: documentation
  color: '0075ca'
  description: 'Documentation improvement'
- name: duplicate
  color: 'cfd3d7'
  description: 'Duplicate issue'
- name: wontfix
  color: 'ffffff'
  description: 'Will not be implemented'
- name: 'priority: high'
  color: 'b60205'
  description: 'High priority'
- name: 'priority: low'
  color: 'e4e669'
  description: 'Low priority'
- name: needs-triage
  color: 'fbca04'
  description: 'Not yet triaged'
- name: stale
  color: 'ededed'
  description: 'No recent activity'
